<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XINKEDU - Education Management</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #eff2ff;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }
        .login-box h1 { margin-bottom: 24px; color: #4e60ff; }
        .login-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            color: white;
        }
        .btn-admin { background: #4e60ff; }
        .btn-teacher { background: #10b981; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>XINKEDU</h1>
        <p style="margin-bottom: 24px; color: #64748b;">Xin chào! Vui lòng chọn tài khoản để đăng nhập:</p>
        
        <a href="admin/courses_grid.html" class="login-btn btn-admin">Đăng nhập bằng Admin</a>
        <a href="teacher/home.html" class="login-btn btn-teacher">Đăng nhập quản lý Lớp (Teacher)</a>
    </div>
</body>
</html>
