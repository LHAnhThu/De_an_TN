<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Detail</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/css_admin/course_management.css">
    <link rel="stylesheet" href="../assets/css/css_admin/add_course.css">
    <link rel="stylesheet" href="../assets/css/css_admin/detail_lesson.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Container -->
        <aside id="sidebar-container" class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <header id="header-container" class="top-header"></header>

            <div class="content-body-split" style="padding-bottom: 100px;">
                <!-- LEFT PANE -->
                <div class="structure-pane">
                    <div class="structure-header">
                        Course Structure
                        <button class="btn btn-primary" style="padding: 0; width: 24px; height: 24px; display:flex; align-items:center; justify-content:center; border-radius:4px;"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="structure-body" id="structure-tree-container">
                        <!-- Tree will be injected here -->
                    </div>
                </div>

                <!-- RIGHT PANE -->
                <div class="details-pane" id="right-pane-wrapper">
                    <div class="content-body" style="padding: 0; min-height: auto; width: 100%;">
                        <div id="lesson-detail-container">
                            <!-- Injected by lesson_detail.js -->
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/components/sidebar.js"></script>
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/js_admin/lesson_detail.js"></script>
    <script>
        loadSidebar('admin', 'courses');
        loadHeader({
            title: '<span style="font-size:14px; color:#8C8C8C; font-weight:400; cursor:pointer;" onclick="lessonDetail.goBack()">TOEIC L&R: Conquer 900+</span> <span style="font-size:14px; color:#8C8C8C; font-weight:400; ">&gt;</span> <span style="font-size:14px; color:#8C8C8C; font-weight:400;" id="bd-level">Level</span> <span style="font-size:14px; color:#8C8C8C; font-weight:400; ">&gt;</span> <span style="font-size:14px; color:#8C8C8C; font-weight:400;" id="bd-chapter">Chapter</span> <span style="font-size:14px; color:#8C8C8C; font-weight:400;">&gt;</span> <span style="font-size:14px; font-weight:700; color:#8C8C8C;" id="bd-lesson">Lesson</span>',
            subtitle: '',
            userName: 'Tran Dinh Phuoc',
            userAvatar: '../assets/img/user_avatar.png',
            showIcon: true
        });
    </script>
</body>
</html>
