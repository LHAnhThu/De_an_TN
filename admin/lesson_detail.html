<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Detail</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/css_admin/course_management.css">
    <link rel="stylesheet" href="../assets/css/css_admin/detail_course.css">
    <link rel="stylesheet" href="../assets/css/css_admin/detail_lesson.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Container -->
        <aside class="sidebar" id="sidebar-container">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="../assets/img/XinkEdu_logo.png" alt="XINKEDU">
                    <span>XINKEDU</span>
                </div>
                <i class="fa-solid fa-bars menu-toggle" style="font-size: 20px; color: #64748b;"></i>
            </div>
            <div class="user-profile-box">
                <img src="../assets/img/user_avatar.png" alt="User">
                <div class="user-info">
                    <h4>Hi, Phuoc</h4>
                    <p>ADMIN</p>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="courses_grid.html" class="menu-item"><i class="fa-solid fa-book"></i><span>Course
                        Management</span></a>
                <a href="students_list.html" class="menu-item"><i class="fa-solid fa-user-graduate"></i><span>Student
                        Management</span></a>
                <a href="class_allocation.html" class="menu-item"><i class="fa-solid fa-users-rectangle"></i><span>Class
                        Allocation</span></a>
                <a href="teaching_management.html" class="menu-item"><i
                        class="fa-solid fa-person-chalkboard"></i><span>Teaching Management</span></a>
            </nav>
            <a href="../login.html" class="logout-btn"><i
                    class="fa-solid fa-right-from-bracket"></i><span>LOGOUT</span></a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header" id="header-container">
                <div class="header-titles">
                    <h1><span id="bd-course-name" style="font-size:14px; color:#8C8C8C; font-weight:400; cursor:pointer;"
                            onclick="lessonDetail.goBack()">TOEIC L&R: Conquer 900+</span> <span
                            style="font-size:14px; color:#8C8C8C; font-weight:400; ">&gt;</span> <span
                            style="font-size:14px; color:#8C8C8C; font-weight:400;" id="bd-level">Level</span> <span
                            style="font-size:14px; color:#8C8C8C; font-weight:400; ">&gt;</span> <span
                            style="font-size:14px; color:#8C8C8C; font-weight:400;" id="bd-chapter">Chapter</span> <span
                            style="font-size:14px; color:#8C8C8C; font-weight:400;">&gt;</span> <span
                            style="font-size:14px; font-weight:700; color:#8C8C8C;" id="bd-lesson">Lesson</span></h1>
                    <p></p>
                </div>
                <div class="header-actions">
                    <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                    <button class="icon-btn"><i class="fa-regular fa-message"></i></button>
                    <div class="user-dropdown">
                        <img src="../assets/img/user_avatar.png" alt="Tran Dinh Phuoc">
                        <span style="font-weight: 500; font-size: 14px;">Tran Dinh Phuoc</span>
                        <i class="fa-solid fa-caret-down" style="padding-left: 5px;"></i>
                    </div>
                </div>
            </header>

            <div class="content-body-split">
                <!-- LEFT PANE -->
                <div class="structure-pane">
                    <div class="structure-header">
                        Course Structure
                        <button class="btn btn-primary" id="btn-global-add-level"
                            style="padding: 0; width: 24px; height: 24px; display:flex; align-items:center; justify-content:center; border-radius:4px;"
                            onclick="lessonDetail.addNode(null, 'level')"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="structure-body" id="structure-tree-container">
                        <!-- Tree will be injected here -->
                    </div>
                </div>

                <!-- RIGHT PANE -->
                <div class="details-pane" id="right-pane-wrapper">
                    <div class="content-body" style="padding: 0; min-height: auto; width: 100%;">
                        <div id="lesson-detail-container">
                            <!-- Injected by lesson_detail.js -->
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Confirm Modal -->
    <div id="delete-session-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.1); z-index:9999; align-items:center; justify-content:center;">
        <div
            style="background:white; border-radius:8px; padding:24px 32px; min-width:300px; max-width: 400px; text-align:center; position:relative; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
            <i class="fa-solid fa-xmark"
                style="position:absolute; top:16px; right:16px; color:#ef4444; font-size:16px; cursor:pointer;"
                onclick="lessonDetail.closeDeleteModal()"></i>
            <h3
                style="margin-top:0; margin-bottom:24px; font-size:18px; color:#0f172a; font-weight:600; text-align: center;">
                Confirm</h3>
            <p style="color:#64748b; font-size:14px; margin-bottom:24px; font-style:italic;">
                Are you sure you want to <strong style="color:#64748b; font-style:italic; font-weight:700;">delete this
                    session</strong>?</p>
            <div style="display:flex; justify-content:center; gap:12px;">
                <button
                    style="background:#d1d5db; color:#374151; border:none; padding:8px 24px; border-radius:6px; font-weight:600; cursor:pointer; font-size:14px;"
                    onclick="lessonDetail.closeDeleteModal()">Cancel</button>
                <button
                    style="background:#ef4444; color:white; border:none; padding:8px 24px; border-radius:6px; font-weight:600; cursor:pointer; font-size:14px;"
                    onclick="lessonDetail.confirmDeleteSession()">Delete</button>
            </div>
        </div>
    </div>

    <!-- ================= TEMPLATES ================= -->
    <template id="tpl-tree-level-editing">
        <div class="tree-node">
            <div class="tree-row editing-row" style="background-color: #F3FBFF;">
                <i class="fa-solid fa-layer-group" style="color:#475569;"></i>
                <input type="text" class="tree-edit-input" id="edit-level-input-{{id}}" value=""
                    placeholder="Enter level name..."
                    style="width: 140px; margin-left: 4px; font-size: 13px; border: 1.5px solid #e5e7eb; border-radius: 6px; padding: 4px 10px; outline: none; background: #f8fafc; color: #0f172a; font-weight: 500;"
                    autofocus onkeydown="lessonDetail.handleEditNodeKey(event, 'level', '{{id}}')"
                    onblur="lessonDetail.handleEditNodeBlur('level', '{{id}}')" />
                <button class="tree-btn-add"
                    onclick="lessonDetail.addNode('{{id}}', 'chapter'); event.stopPropagation();"><i
                        class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </template>

    <template id="tpl-tree-level">
        <div class="tree-node">
            <div style="background-color: #F3FBFF;" class="tree-row">
                <i class="fa-solid fa-layer-group" style="color:#475569;"></i> {{name}}
                {{addBtnHtml}}
            </div>
            <div class="tree-children">
                {{children}}
            </div>
        </div>
    </template>

    <template id="tpl-tree-chapter-editing">
        <div class="tree-node">
            <div class="tree-row editing-row">
                <i class="fa-regular fa-folder" style="color:#94a3b8;"></i>
                <input type="text" class="tree-edit-input" id="edit-chapter-input-{{id}}" value=""
                    placeholder="Enter chapter name..."
                    style="width: 140px; margin-left: 4px; font-size: 13px; border: 1.5px solid #e5e7eb; border-radius: 6px; padding: 4px 10px; outline: none; background: #f8fafc; color: #0f172a; font-weight: 500;"
                    autofocus onkeydown="lessonDetail.handleEditNodeKey(event, 'chapter', '{{levelId}}', '{{id}}')"
                    onblur="lessonDetail.handleEditNodeBlur('chapter', '{{levelId}}', '{{id}}')" />
                <button class="tree-btn-add"
                    onclick="lessonDetail.addNode('{{id}}', 'lesson'); event.stopPropagation();"><i
                        class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </template>

    <template id="tpl-tree-chapter">
        <div class="tree-node">
            <div class="tree-row">
                <i class="fa-regular fa-folder" style="color:#94a3b8;"></i> {{name}}
                {{addBtnHtml}}
            </div>
            <div class="tree-children">
                {{children}}
            </div>
        </div>
    </template>

    <template id="tpl-tree-lesson-editing">
        <div class="tree-row editing-row">
            <i class="fa-regular fa-file-lines" style="color:#cbd5e1;"></i>
            <input type="text" class="tree-edit-input" id="edit-lesson-input-{{id}}" value=""
                placeholder="Enter lesson name..."
                style="width: 140px; margin-left: 4px; font-size: 13px; border: 1.5px solid #e5e7eb; border-radius: 6px; padding: 4px 10px; outline: none; background: #f8fafc; color: #0f172a; font-weight: 500;"
                autofocus onkeydown="lessonDetail.handleEditNodeKey(event, 'lesson', '{{chapterId}}', '{{id}}')"
                onblur="lessonDetail.handleEditNodeBlur('lesson', '{{chapterId}}', '{{id}}')" />
        </div>
    </template>

    <template id="tpl-tree-lesson">
        <div class="tree-row is-lesson {{activeClass}}" onclick="lessonDetail.navigateToLesson('{{id}}')">
            <i class="fa-regular fa-file-lines" style="color:#cbd5e1;"></i> {{name}}
        </div>
    </template>

    <template id="tpl-view-wrapper">
        <div class="lesson-header-row">
            <div>
                <h2>{{name}}</h2>
                <div class="lesson-id">ID: {{lessonIdStr}}</div>
            </div>
            <button class="btn btn-outline-danger" onclick="lessonDetail.deleteNode()"><i
                    class="fa-regular fa-trash-can"></i> Delete</button>
        </div>

        <div style="display:flex; gap:20px; margin-bottom: 10px; max-width: 900px;">
            <div
                style="flex:1; background:white; padding:20px 24px; border-radius:10px; border:1px solid #e2e8f0; font-size:13px;">
                <div style="color:#0f172a; font-weight:700; margin-bottom:4px;">LEVEL 01:</div>
                <div style="color:#475569; font-size:14px;">{{pLevelName}}</div>
            </div>
            <div
                style="flex:1; background:white; padding:20px 24px; border-radius:10px; border:1px solid #e2e8f0; font-size:13px;">
                <div style="color:#0f172a; font-weight:700; margin-bottom:4px;">CHAPTER 1:</div>
                <div style="color:#475569; font-size:14px;">{{pChapterName}}</div>
            </div>
        </div>

        <div class="class-tabs">
            {{tabsHtml}}
        </div>

        <div style="padding: 16px 0;">
            {{contentHtml}}
        </div>
    </template>

    <template id="tpl-upload-module-empty">
        <div class="upload-module">
            <div class="upload-header">
                <div class="upload-header-left">
                    <i class="fa-solid {{iconClass}}" {{iconStyleAttr}}></i>
                    <div>
                        <div class="upload-title">{{title}}</div>
                        <div class="upload-desc">{{desc}}</div>
                    </div>
                </div>
                {{uiActions}}
            </div>
            <div class="upload-body">
                <div class="upload-dropzone" onclick="lessonDetail.toggleUploadStandard('{{docType}}', true)">
                    <i class="fa-solid fa-cloud-arrow-up dropzone-icon"
                        style="font-size:36px; color:#cbd5e1; margin-bottom:8px; display:block;"></i>
                    <span style="font-weight:600; color:#94a3b8;">Drag & Drop or Click to Select File</span>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-upload-module-filled">
        <div class="upload-module">
            <div class="upload-header">
                <div class="upload-header-left">
                    <i class="fa-solid {{iconClass}}" {{iconStyleAttr}}></i>
                    <div>
                        <div class="upload-title">{{title}}</div>
                        <div class="upload-desc">{{desc}}</div>
                    </div>
                </div>
                {{uiActions}}
            </div>
            <div class="upload-body">
                <div class="uploaded-file-row">
                    <div class="uploaded-file-info">
                        <i class="fa-solid fa-file-pdf uploaded-file-icon"></i>
                        <div>
                            <div class="uploaded-file-name">File_{{docType}}_{{nodeId}}.pdf</div>
                            <div class="uploaded-file-meta">38.2 MB • Updated 2 days ago</div>
                        </div>
                    </div>
                    <div class="uploaded-actions">
                        <button onclick="lessonDetail.toggleUploadStandard('{{docType}}', false)"><i
                                class="fa-solid fa-trash-can"></i></button>
                        <button class="download"><i class="fa-solid fa-download"></i></button>
                    </div>
                </div>
                <div class="upload-dropzone" style="padding:20px;">
                    <i class="fa-solid fa-cloud-arrow-up dropzone-icon"
                        style="font-size:24px; color:#cbd5e1; display:inline-block; margin-bottom:0; vertical-align:middle;"></i>
                    <span style="font-weight:600; color:#94a3b8; margin-left:12px;">Drag & Drop or Click to Select
                        File</span>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-session-block">
        <div class="session-block">
            <div class="session-header">
                <div style="display:flex; align-items:center; gap:8px;"><i class="fa-regular fa-file-lines"
                        style="color:#94a3b8;"></i> {{nameHtml}}</div>
                {{sessionActions}}
            </div>
            <div class="session-grid">
                {{cellsHtml}}
            </div>
        </div>
    </template>

    <template id="tpl-session-cell-empty">
        <div class="session-cell">
            <div class="upload-header">
                <div class="upload-header-left">
                    <i class="fa-solid {{iconClass}}" {{iconStyleAttr}}></i>
                    <div>
                        <div class="upload-title">{{title}}</div>
                        <div class="upload-desc">{{desc}}</div>
                    </div>
                </div>
            </div>
            <div class="session-cell-body">
                <button class="session-btn-upload"
                    onclick="lessonDetail.toggleUploadSession('{{sessionId}}', '{{docType}}', true)">Upload
                    File</button>
            </div>
        </div>
    </template>

    <template id="tpl-session-cell-filled">
        <div class="session-cell">
            <div class="upload-header">
                <div class="upload-header-left">
                    <i class="fa-solid {{iconClass}}" {{iconStyleAttr}}></i>
                    <div>
                        <div class="upload-title">{{title}}</div>
                        <div class="upload-desc">{{desc}}</div>
                    </div>
                </div>
            </div>
            <div class="session-cell-body">
                <div class="uploaded-file-row" style="padding:10px 14px; margin-bottom:12px;">
                    <div class="uploaded-file-info" style="gap:10px;">
                        <i class="fa-solid fa-file-pdf uploaded-file-icon" style="font-size:20px;"></i>
                        <div>
                            <div class="uploaded-file-name" style="font-size:12px;">File_{{docType}}.pdf</div>
                            <div class="uploaded-file-meta" style="font-size:10px;">38.2 MB</div>
                        </div>
                    </div>
                    <div class="uploaded-actions">
                        <button onclick="lessonDetail.toggleUploadSession('{{sessionId}}', '{{docType}}', false)"
                            style="padding:0;"><i class="fa-solid fa-trash-can" style="font-size:14px;"></i></button>
                        <button class="download"><i class="fa-solid fa-download" style="font-size:14px;"></i></button>
                    </div>
                </div>
                <button class="session-btn-upload">Upload File</button>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="../assets/js/js_admin/lesson_detail.js"></script>
</body>

</html>
