<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/css_admin/course_management.css">
    <link rel="stylesheet" href="../assets/css/css_admin/student_management.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Container (App Global) -->
        <aside id="sidebar-container" class="sidebar"></aside>

        <!-- Main Content (App Global) -->
        <main class="main-content students-page">
            <header id="header-container" class="top-header"></header>

            <div class="content-body">
                 <div class="controls-area">
                    <div class="search-bar">
                        <i class="fa-solid fa-search" style="color: #94a3b8;"></i>
                        <input type="text" id="search-students" placeholder="Search by Name, Phone...">
                    </div>
                    <button class="btn btn-outline" id="btn-reload"><i class="fa-solid fa-rotate-right"></i> Reload</button>
                    <div class="select-wrapper">
                        <select id="filter-status" aria-label="Filter students by status">
                            <option value="all">All Statuses</option>
                            <option value="active">Active</option>
                            <option value="locked">Locked</option>
                            <option value="inactive">Not Activated</option>
                        </select>
                    </div>
                    <div class="spacer"></div>
                    <button class="btn btn-primary" id="btn-add-student"><i class="fa-solid fa-plus"></i> Add Student</button>
                </div>

                <!-- Students Table -->
                <div class="table-container">
                    <table class="data-table" id="students-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Account/ Email</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Total Courses</th>
                                <th>Date Created</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body">
                            <!-- Student rows will be populated here -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination (static UI, như mock) -->
                <div class="pagination-footer">
                    <div class="showing-text">
                        Showing <strong>1-6</strong> of <strong>24</strong> students
                    </div>
                    <div class="pagination">
                        <button class="page-btn"><i class="fa-solid fa-caret-left"></i></button>
                        <button class="page-btn active">1</button>
                        <button class="page-btn">2</button>
                        <button class="page-btn">3</button>
                        <span class="dots">...</span>
                        <button class="page-btn">4</button>
                        <button class="page-btn"><i class="fa-solid fa-caret-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Student Modal -->
    <div id="add-student-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Student</h2>
                <button class="btn-close" id="close-add-modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="add-student-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Name <span class="required">*</span></label>
                            <input type="text" class="form-control" id="student-name" required>
                        </div>
                        <div class="form-group">
                            <label>Date of Birth <span class="required">*</span></label>
                            <input type="date" class="form-control" id="student-dob" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Gender <span class="required">*</span></label>
                            <select class="form-control" id="student-gender" required>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Phone <span class="required">*</span></label>
                            <input type="tel" class="form-control" id="student-phone" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" class="form-control" id="student-email" required>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" class="form-control" id="student-address">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancel-add-student">Cancel</button>
                <button class="btn-apply" id="save-student">Add Student</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/components/sidebar.js"></script>
    <script src="../assets/js/components/header.js"></script>
    <script src="../assets/js/students-list.js"></script>
    <script>
        loadSidebar('admin', 'students');
        loadHeader({
            title: 'Student Management',
            subtitle: 'Manage and track detailed student information',
            userName: 'Tran Dinh Phuoc',
            userAvatar: '../assets/img/user_avatar.png',
            showIcon: true
        });

        // Initialize student management
        document.addEventListener('DOMContentLoaded', () => {
            studentManagement.init();
        });
    </script>
</body>
</html>
