<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Lobby - XINKEDU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/css_teacher/class_lobby.css">
</head>
<body>
    <header class="lobby-header">
        <a href="home.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 class="header-greeting">Hi, Nguyễn Thị Hoàng Ngân</h1>
    </header>

    <main class="lobby-main">
        <div class="class-title-label">Class:</div>
        <div class="class-name">STU0098786 - Nguyễn Ngọc Gia Huy - KE45-LC89-N2</div>
        
        <div class="class-meta">
            <div class="meta-item">
                <i class="fa-regular fa-calendar"></i>
                <span>Fri, 13.03.2026</span>
            </div>
            <div class="meta-item">
                <i class="fa-regular fa-clock"></i>
                <span>20:00 - 20:45</span>
            </div>
            <div class="meta-item">
                <i class="fa-solid fa-user"></i>
                <span>Nguyễn Ngọc Gia Huy</span>
            </div>
        </div>

        <div class="upcoming-alert">The class is upcoming!</div>

        <div class="timer-container">
            <!-- Days -->
            <div class="timer-section">
                <div class="digits-row">
                    <div class="digit">0</div>
                    <div class="digit">0</div>
                </div>
                <div class="timer-label">Days</div>
            </div>
            <!-- Hours -->
            <div class="timer-section">
                <div class="digits-row">
                    <div class="digit">0</div>
                    <div class="digit">0</div>
                </div>
                <div class="timer-label">Hours</div>
            </div>
            <!-- Minutes -->
            <div class="timer-section">
                <div class="digits-row">
                    <div class="digit">0</div>
                    <div class="digit">3</div>
                </div>
                <div class="timer-label">Minutes</div>
            </div>
            <!-- Seconds -->
            <div class="timer-section">
                <div class="digits-row">
                    <div class="digit">0</div>
                    <div class="digit">0</div>
                </div>
                <div class="timer-label">Seconds</div>
            </div>
        </div>

        <a href="virtual_classroom.html" class="btn-join">Join class</a>
    </main>
</body>
</html>
